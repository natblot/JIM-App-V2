<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:32px 40px;background:var(--jim-background);min-height:240px;font-family:var(--font-sans)}
  .wrap{max-width:720px}
  .eyebrow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.22em;color:var(--jim-muted);margin:0 0 18px}
  h1{font-family:var(--font-sans);font-weight:800;letter-spacing:-.045em;line-height:1;color:var(--jim-text);font-size:46px;margin:0}
  .accent{font-weight:800;color:var(--jim-primary)}
  .meta{margin-top:22px;display:flex;gap:22px;font-size:11px;color:var(--jim-muted);font-weight:600;letter-spacing:.02em;border-top:1px solid var(--jim-beige-mid);padding-top:12px}
  .meta b{color:var(--jim-text);font-weight:700;letter-spacing:-.005em}
</style></head><body>
  <div class="wrap">
    <p class="eyebrow">Accent éditorial — couleur sur mot pivot</p>
    <h1>Le cabinet <span class="accent">ne&nbsp;s'arrête&nbsp;pas</span> quand vous partez.</h1>
    <div class="meta">
      <span>Famille · <b>Manrope</b></span>
      <span>Graisse · <b>800</b></span>
      <span>Accent · <b>Terracotta #FF7C5C</b></span>
      <span>Tracking · <b>−0.045em</b></span>
    </div>
  </div>
</body></html>
