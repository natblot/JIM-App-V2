<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box}
  body{
    margin:0;padding:64px 24px;min-height:100vh;
    background:var(--jim-background);
    display:flex;justify-content:center;align-items:flex-start;
    font-family:var(--font-sans);
  }

  .wrap{position:relative;width:100%;max-width:440px}

  /* ── Pill ─────────────────────────────────────────── */
  .search{
    display:flex;align-items:center;gap:12px;
    background:var(--jim-surface-alt);
    border:1.5px solid var(--jim-beige-mid);
    border-radius:var(--jim-radius-full);
    padding:16px 22px;
    cursor:text;
    box-shadow:var(--jim-shadow-sm);
    transition:
      border-color var(--jim-duration-normal) var(--jim-ease-fade),
      box-shadow var(--jim-duration-normal) var(--jim-ease-fade),
      background var(--jim-duration-normal) var(--jim-ease-fade),
      transform 360ms var(--jim-ease-spring);
  }
  .search.focused{
    background:var(--jim-surface);
    border-color:var(--jim-primary);
    box-shadow:var(--jim-shadow-lg), 0 0 0 4px var(--jim-primary-pale);
    transform:translateY(-1px) scale(1.012);
  }

  /* magnifier */
  .ic{
    flex-shrink:0;width:22px;height:22px;color:var(--jim-muted);
    transition:color var(--jim-duration-normal) var(--jim-ease),
               transform 520ms var(--jim-ease-spring);
  }
  .search.focused .ic{color:var(--jim-primary)}
  .ic.searching{animation:wiggle .62s var(--jim-ease) }
  @keyframes wiggle{
    0%{transform:rotate(0) scale(1)}
    25%{transform:rotate(-16deg) scale(1.22)}
    50%{transform:rotate(14deg) scale(1.22)}
    75%{transform:rotate(-8deg) scale(1.1)}
    100%{transform:rotate(0) scale(1)}
  }

  input{
    flex:1;border:0;background:transparent;outline:none;
    font-family:var(--font-sans);font-size:16px;font-weight:600;
    color:var(--jim-text);letter-spacing:-.01em;min-width:0;
  }
  input::placeholder{color:var(--jim-beige-dark);font-weight:500}

  .kbd{
    flex-shrink:0;display:flex;align-items:center;gap:3px;
    font-family:var(--font-mono);font-size:11px;font-weight:600;
    color:var(--jim-muted);
    background:var(--jim-beige-light);
    border:1px solid var(--jim-beige-mid);
    border-radius:7px;padding:3px 7px;
    transition:opacity var(--jim-duration-fast) var(--jim-ease);
  }
  .search.focused .kbd{opacity:0}

  .clear{
    flex-shrink:0;width:22px;height:22px;border:0;cursor:pointer;
    border-radius:var(--jim-radius-full);
    background:var(--jim-beige-light);color:var(--jim-muted);
    display:none;align-items:center;justify-content:center;
    font-size:13px;line-height:1;padding:0;
    transition:background var(--jim-duration-fast) var(--jim-ease),
               color var(--jim-duration-fast) var(--jim-ease);
  }
  .clear:hover{background:var(--jim-primary-pale);color:var(--jim-primary)}
  .clear.show{display:flex}

  /* ── Dropdown ─────────────────────────────────────── */
  .panel{
    position:absolute;top:calc(100% + 10px);left:0;right:0;z-index:20;
    background:var(--jim-surface);
    border:1px solid var(--jim-beige-mid);
    border-radius:var(--jim-radius);
    box-shadow:var(--jim-shadow-xl);
    padding:8px;
    transform-origin:top center;
    opacity:0;transform:translateY(-8px) scale(.98);pointer-events:none;
    transition:opacity 180ms var(--jim-ease-fade),
               transform 220ms var(--jim-ease-spring);
  }
  .panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}

  .panel-cap{
    font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    color:var(--jim-muted);padding:8px 12px 6px;
  }

  .row{
    display:flex;align-items:center;gap:12px;
    padding:9px 12px;border-radius:10px;cursor:pointer;
    opacity:0;transform:translateY(-6px);
    transition:background var(--jim-duration-fast) var(--jim-ease);
  }
  .row.in{animation:rowIn .34s var(--jim-ease-fade) forwards}
  @keyframes rowIn{to{opacity:1;transform:translateY(0)}}
  .row:hover,.row.active{background:var(--jim-surface-alt)}

  .avatar{
    flex-shrink:0;width:34px;height:34px;border-radius:var(--jim-radius-full);
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:var(--jim-primary);
    background:var(--jim-primary-pale);letter-spacing:-.02em;
  }
  .meta{flex:1;min-width:0}
  .nm{font-size:14px;font-weight:700;color:var(--jim-text);letter-spacing:-.01em}
  .nm mark{background:transparent;color:var(--jim-primary);font-weight:800}
  .sub{font-size:12px;color:var(--jim-muted);font-weight:500;margin-top:1px}
  .tag{
    flex-shrink:0;font-size:10px;font-weight:700;
    padding:3px 9px;border-radius:var(--jim-radius-full);
    background:var(--jim-primary-pale);color:var(--jim-primary);
    text-transform:capitalize;
  }

  .empty{
    padding:22px 12px;text-align:center;
    font-size:13px;color:var(--jim-muted);font-weight:500;
  }
  .empty b{color:var(--jim-text);font-weight:700}

  @media (prefers-reduced-motion: reduce){
    .search,.ic,.panel,.row{transition:none!important;animation:none!important}
    .row{opacity:1;transform:none}
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="search" id="search">
      <svg class="ic" id="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
      </svg>
      <input id="input" type="text" placeholder="Rechercher un patient" autocomplete="off" spellcheck="false">
      <button class="clear" id="clear" aria-label="Effacer">✕</button>
      <span class="kbd" id="kbd">⌘K</span>
    </div>

    <div class="panel" id="panel">
      <div class="panel-cap" id="panelCap">Patients récents</div>
      <div id="list"></div>
    </div>
  </div>

<script>
const PATIENTS = [
  { name:"Camille Moreau",   sub:"34 ans · Lombalgie chronique",     tag:"ortho",     recent:true },
  { name:"Lucas Bernard",    sub:"52 ans · Post-op LCA genou droit", tag:"sport",     recent:true },
  { name:"Amélie Rousseau",  sub:"28 ans · Rééducation épaule",      tag:"ortho",     recent:true },
  { name:"Thomas Lefèvre",   sub:"61 ans · AVC, hémiparésie G",      tag:"neuro" },
  { name:"Inès Garnier",     sub:"7 ans · Kiné respiratoire",        tag:"respi" },
  { name:"Hugo Petit",       sub:"45 ans · Cervicalgie",             tag:"ortho" },
  { name:"Sarah Lambert",    sub:"39 ans · Tendinite cheville",      tag:"sport" },
  { name:"Nathan Faure",     sub:"73 ans · Maladie de Parkinson",    tag:"neuro" },
];

const search = document.getElementById('search');
const input  = document.getElementById('input');
const panel  = document.getElementById('panel');
const list   = document.getElementById('list');
const cap    = document.getElementById('panelCap');
const clear  = document.getElementById('clear');
const icon   = document.getElementById('icon');
let active = -1, current = [];

const initials = n => n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

function highlight(name, q){
  if(!q) return name;
  return name.replace(new RegExp('('+esc(q)+')','ig'), '<mark>$1</mark>');
}

function render(q){
  current = q
    ? PATIENTS.filter(p => p.name.toLowerCase().includes(q.toLowerCase()))
    : PATIENTS.filter(p => p.recent);
  cap.textContent = q ? (current.length+' résultat'+(current.length>1?'s':'')) : 'Patients récents';
  active = -1;

  if(current.length === 0){
    list.innerHTML = '<div class="empty">Aucun patient pour « <b>'+q.replace(/</g,'&lt;')+'</b> »</div>';
    return;
  }
  list.innerHTML = current.map((p,i)=>`
    <div class="row" data-i="${i}" style="animation-delay:${i*42}ms">
      <span class="avatar">${initials(p.name)}</span>
      <span class="meta">
        <span class="nm">${highlight(p.name,q)}</span>
        <span class="sub">${p.sub}</span>
      </span>
      <span class="tag">${p.tag}</span>
    </div>`).join('');
  // trigger stagger
  requestAnimationFrame(()=> list.querySelectorAll('.row').forEach(r=>r.classList.add('in')));
  bindRows();
}

function bindRows(){
  list.querySelectorAll('.row').forEach(r=>{
    r.addEventListener('mouseenter', ()=>setActive(+r.dataset.i));
    r.addEventListener('click', ()=>choose(+r.dataset.i));
  });
}
function setActive(i){
  active=i;
  list.querySelectorAll('.row').forEach(r=>r.classList.toggle('active', +r.dataset.i===i));
}
function choose(i){
  const p = current[i]; if(!p) return;
  input.value = p.name;
  clear.classList.add('show');
  icon.classList.remove('searching'); void icon.offsetWidth; icon.classList.add('searching');
  close();
}
function open(){ panel.classList.add('open'); }
function close(){ panel.classList.remove('open'); search.classList.remove('focused'); }

search.addEventListener('click', ()=> input.focus());
input.addEventListener('focus', ()=>{ search.classList.add('focused'); render(input.value.trim()); open(); });
input.addEventListener('input', ()=>{
  const v = input.value.trim();
  clear.classList.toggle('show', v.length>0);
  render(v); open();
});
input.addEventListener('blur', ()=> setTimeout(close, 160));

input.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'){ e.preventDefault(); setActive(Math.min(active+1, current.length-1)); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); setActive(Math.max(active-1, 0)); }
  else if(e.key==='Enter'){ e.preventDefault(); if(active>=0) choose(active); else { icon.classList.remove('searching'); void icon.offsetWidth; icon.classList.add('searching'); } }
  else if(e.key==='Escape'){ input.blur(); }
});

clear.addEventListener('click', ()=>{
  input.value=''; clear.classList.remove('show'); render(''); input.focus();
});

document.addEventListener('keydown', e=>{
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); input.focus(); }
});

render('');
</script>
</body>
</html>
