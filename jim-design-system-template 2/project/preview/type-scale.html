<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>

  .body{font-size:17px;font-weight:400;color:var(--jim-text-body);letter-spacing:0;line-height:1.5}

  <div class="row"><span class="meta">H1 · 56</span><span class="sample h1">Le cabinet</span></div>

  <div class="row"><span class="meta">H3 · 24</span><span class="sample h3">Remplacement ortho</span></div>
