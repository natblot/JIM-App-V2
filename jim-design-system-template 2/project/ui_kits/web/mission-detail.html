<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JIM — Détail mission · dashboard</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="messagerie-alternatives.css">
<link rel="stylesheet" href="search-bar.css">
<link rel="stylesheet" href="mission-detail.css">
<link rel="stylesheet" href="mission-dashboard.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script src="search-bar.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; background: var(--jim-background); }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 0;
  }
  #root { display: contents; }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="mission-detail.jsx"></script>
<script type="text/babel" src="mission-dashboard.jsx"></script>

<script type="text/babel">
  const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect, TweakToggle } = window;
  const { MissionDashboard } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "sigState": "to-sign",
    "density": "comfortable",
    "heroStyle": "gradient",
    "openPanel": "none",
    "sendToOrdre": true
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    React.useEffect(() => {
      const i = setInterval(() => window.lucide && window.lucide.createIcons(), 250);
      return () => clearInterval(i);
    }, []);

    return (
      <React.Fragment>
        <MissionDashboard
          sigState={t.sigState}
          sendToOrdre={t.sendToOrdre}
          density={t.density}
          heroStyle={t.heroStyle}
          openPanel={t.openPanel}
          onOpen={(p) => setTweak('openPanel', p)}
        />

        <TweaksPanel title="Tweaks · Dashboard mission">
          <TweakSection label="État du dossier" />
          <TweakSelect
            label="État signature"
            value={t.sigState}
            options={[
              { value: "to-sign",   label: "À signer (audit IA fait)" },
              { value: "signed",    label: "Signé · envoi à l'Ordre" },
              { value: "confirmed", label: "Inscrit à l'Ordre" }
            ]}
            onChange={(v) => setTweak('sigState', v)}
          />
          <TweakSelect
            label="Panneau de détail ouvert"
            value={t.openPanel}
            options={[
              { value: "none",          label: "Aucun (dashboard)" },
              { value: "contrat",       label: "Contrat" },
              { value: "transmissions", label: "Transmissions" },
              { value: "chat",          label: "Chat" }
            ]}
            onChange={(v) => setTweak('openPanel', v)}
          />

          <TweakSection label="Mise en page" />
          <TweakRadio
            label="Densité"
            value={t.density}
            options={[
              { value: "comfortable", label: "Confort" },
              { value: "compact",     label: "Compact" }
            ]}
            onChange={(v) => setTweak('density', v)}
          />
          <TweakRadio
            label="Cartes hero"
            value={t.heroStyle}
            options={[
              { value: "gradient", label: "Dégradés" },
              { value: "flat",     label: "Sobres" }
            ]}
            onChange={(v) => setTweak('heroStyle', v)}
          />

          <TweakSection label="Ordre" />
          <TweakToggle
            label="Envoi automatique à l'Ordre"
            value={t.sendToOrdre}
            onChange={(v) => setTweak('sendToOrdre', v)}
          />
        </TweaksPanel>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
