<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>JIM — Header · Explorations animées</title>
  <link rel="stylesheet" href="colors_and_type.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: var(--jim-background); min-height: 100vh; }
    *, *::before, *::after { box-sizing: border-box; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
    a { color: inherit; text-decoration: none; }

    /* warm grain backdrop */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(circle at 15% 15%, rgba(255,124,92,0.09) 0%, transparent 42%),
        radial-gradient(circle at 85% 70%, rgba(245,184,106,0.07) 0%, transparent 50%);
    }
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(58,31,8,1) 1px, transparent 1px);
      background-size: 28px 28px; opacity: 0.05;
    }
    #root { position: relative; z-index: 1; }

    /* ---------- shared keyframes ---------- */
    @keyframes pulseDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%      { transform: scale(0.85); opacity: 0.4; }
    }
    @keyframes pingRing {
      0%   { transform: scale(0.6); opacity: 0.55; }
      80%  { transform: scale(2.4); opacity: 0; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(220%); }
    }
    @keyframes drop {
      from { opacity: 0; transform: translateY(-6px) scale(0.985); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes itemUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,124,92,0.45); }
      50%      { box-shadow: 0 0 0 10px rgba(255,124,92,0); }
    }
    @keyframes wordmarkBounce {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(-3px) rotate(-3deg); }
      60%  { transform: translateY(0) rotate(2deg); }
      100% { transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* simple scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--jim-beige-mid); border-radius: 999px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>

  <script>
    window.__TWEAK_DEFAULTS_RAW = /*EDITMODE-BEGIN*/{
      "variant": "all",
      "active": "Messagerie",
      "showRoles": true,
      "primary": "#ff7c5c"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
