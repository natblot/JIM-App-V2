<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--jim-background)}
  .row{display:grid;grid-template-columns:60px 60px 1fr;align-items:center;gap:14px;padding:8px 0;border-bottom:1px solid var(--jim-beige-mid)}
  .row:last-child{border:0}
  .name{font-size:11px;font-weight:700;color:var(--jim-text);text-transform:uppercase;letter-spacing:.12em}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--jim-muted)}
  .bar{height:12px;background:var(--jim-primary);border-radius:2px}
</style></head><body>
  <div class="row"><span class="name">xs</span><span class="val">4 px</span><span class="bar" style="width:4px"></span></div>
  <div class="row"><span class="name">sm</span><span class="val">8 px</span><span class="bar" style="width:8px"></span></div>
  <div class="row"><span class="name">md</span><span class="val">16 px</span><span class="bar" style="width:16px"></span></div>
  <div class="row"><span class="name">lg</span><span class="val">24 px</span><span class="bar" style="width:24px"></span></div>
  <div class="row"><span class="name">xl</span><span class="val">32 px</span><span class="bar" style="width:32px"></span></div>
  <div class="row"><span class="name">2xl</span><span class="val">48 px</span><span class="bar" style="width:48px"></span></div>
</body></html>
