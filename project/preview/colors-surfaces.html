<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:22px;background:var(--jim-background);display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .sw{border-radius:14px;padding:12px;min-height:150px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(58,31,8,.08)}
  .name{font-size:11px;font-weight:700;letter-spacing:-.01em}
  .hex{font-family:var(--font-mono);font-size:10px;margin-top:2px}
  .group{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--jim-muted);margin-bottom:6px;grid-column:1/-1}
</style></head><body>
  <div class="group">Surfaces</div>
  <div class="sw" style="background:#fdf6ed"><div class="name">background</div><div class="hex">#fdf6ed</div></div>
  <div class="sw" style="background:#ffffff"><div class="name">surface</div><div class="hex">#ffffff</div></div>
  <div class="sw" style="background:#fbf0e8"><div class="name">surface-alt</div><div class="hex">#fbf0e8</div></div>
  <div class="sw" style="background:#f7ede0"><div class="name">beige-light</div><div class="hex">#f7ede0</div></div>
  <div class="sw" style="background:#edd9c4"><div class="name">beige-mid (border)</div><div class="hex">#edd9c4</div></div>

  <div class="group" style="margin-top:6px">Texte</div>
  <div class="sw" style="background:#3a1f08"><div class="name" style="color:#fff">text</div><div class="hex" style="color:#fff">#3a1f08</div></div>
  <div class="sw" style="background:#5a3418"><div class="name" style="color:#fff">text-body</div><div class="hex" style="color:#fff">#5a3418</div></div>
  <div class="sw" style="background:#7a5434"><div class="name" style="color:#fff">muted</div><div class="hex" style="color:#fff">#7a5434</div></div>
  <div class="sw" style="background:#dcbfa0"><div class="name">beige-dark</div><div class="hex">#dcbfa0</div></div>
  <div class="sw" style="background:#edd9c4"><div class="name">border</div><div class="hex">#edd9c4</div></div>
</body></html>
