<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:28px 24px;background:var(--jim-background);display:flex;flex-direction:column;gap:20px}
  .row{display:flex;gap:16px;align-items:center}
  .card{background:#fff;flex:1;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(58,31,8,.04)}
  .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--jim-text)}
  .val{font-family:var(--font-mono);font-size:9px;color:var(--jim-muted);margin-top:3px}
  .group{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--jim-muted);width:70px;flex-shrink:0}
</style></head><body>
  <div class="row">
    <span class="group">Shadow</span>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow-sm)"><span class="lbl">sm</span><span class="val">0 1 3</span></div>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow)"><span class="lbl">default</span><span class="val">0 2 16</span></div>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow-md)"><span class="lbl">md</span><span class="val">0 4 12</span></div>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow-lg)"><span class="lbl">lg</span><span class="val">0 6 20</span></div>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow-xl)"><span class="lbl">xl</span><span class="val">0 12 40</span></div>
  </div>
  <div class="row">
    <span class="group">Radius</span>
    <div class="card" style="border-radius:8px;box-shadow:var(--jim-shadow)"><span class="lbl">sm</span><span class="val">8px</span></div>
    <div class="card" style="border-radius:16px;box-shadow:var(--jim-shadow)"><span class="lbl">default</span><span class="val">16px</span></div>
    <div class="card" style="border-radius:24px;box-shadow:var(--jim-shadow)"><span class="lbl">lg</span><span class="val">24px</span></div>
    <div class="card" style="border-radius:36px;box-shadow:var(--jim-shadow)"><span class="lbl">xl</span><span class="val">36px</span></div>
    <div class="card" style="border-radius:999px;box-shadow:var(--jim-shadow);padding:0 20px"><span class="lbl">full</span><span class="val">9999px</span></div>
  </div>
</body></html>
