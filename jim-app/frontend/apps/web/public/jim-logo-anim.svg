<style>
  .letter-j { animation: a-rise 0.55s 0s cubic-bezier(.2,.8,.3,1.1) both; transform-origin: 290px 580px; transform-box: fill-box; }
  .letter-i { animation: a-rise 0.55s 0.08s cubic-bezier(.2,.8,.3,1.1) both; transform-origin: 517px 580px; transform-box: fill-box; }
  .letter-m { animation: a-rise 0.55s 0.16s cubic-bezier(.2,.8,.3,1.1) both; transform-origin: 780px 580px; transform-box: fill-box; }
  .dot-j    { animation: a-drop 0.7s 0.70s cubic-bezier(.5,0,.5,1.2) both; transform-origin: center; transform-box: fill-box; }
  .dot-i    { animation: a-drop 0.7s 0.82s cubic-bezier(.5,0,.5,1.2) both; transform-origin: center; transform-box: fill-box; }
  .tagline  { animation: a-tag 0.55s 1.55s ease-out both; }
  @keyframes a-rise {
    0%   { transform: translateY(120px); opacity: 0; }
    60%  { transform: translateY(-14px); opacity: 1; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes a-drop {
    0%   { transform: translateY(-260px); opacity: 0; }
    60%  { transform: translateY(0) scale(1,1); opacity: 1; }
    75%  { transform: translateY(0) scale(1.25, 0.72); }
    88%  { transform: translateY(0) scale(0.92, 1.12); }
    100% { transform: translateY(0) scale(1,1); }
  }
  @keyframes a-tag {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
