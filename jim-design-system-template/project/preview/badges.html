<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:28px;background:var(--jim-background);display:flex;flex-direction:column;gap:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--jim-muted);width:84px;flex-shrink:0}
  .b{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid transparent}
  .dot{width:6px;height:6px;border-radius:50%}
</style></head><body>
  <div class="row"><span class="lbl">Solid</span>
    <span class="b" style="background:var(--jim-primary);color:#fff">⚡ URGENT</span>
    <span class="b" style="background:var(--jim-success);color:#fff">Actif</span>
    <span class="b" style="background:var(--jim-destructive);color:#fff">Échoué</span>
  </div>
  <div class="row"><span class="lbl">Soft</span>
    <span class="b" style="background:var(--jim-primary-pale);color:var(--jim-primary);border-color:rgba(255,124,92,.2)"><span class="dot" style="background:var(--jim-primary)"></span>Primary</span>
    <span class="b" style="background:var(--jim-success-bg);color:var(--jim-success);border-color:rgba(93,143,102,.3)"><span class="dot" style="background:var(--jim-success)"></span>Signé</span>
    <span class="b" style="background:var(--jim-warning-bg);color:var(--jim-warning);border-color:rgba(176,120,36,.3)"><span class="dot" style="background:var(--jim-warning)"></span>RPPS en attente</span>
    <span class="b" style="background:var(--jim-beige-light);color:var(--jim-text-body);border-color:var(--jim-border)">Remplacement</span>
  </div>
  <div class="row"><span class="lbl">Outline</span>
    <span class="b" style="border-color:var(--jim-primary);color:var(--jim-primary);background:transparent">✓ RPPS</span>
    <span class="b" style="border-color:var(--jim-border);color:var(--jim-text-body);background:#fff">Ortho</span>
    <span class="b" style="border-color:var(--jim-border);color:var(--jim-text-body);background:#fff">Neuro</span>
    <span class="b" style="border-color:var(--jim-border);color:var(--jim-text-body);background:#fff">Respi</span>
  </div>
</body></html>
