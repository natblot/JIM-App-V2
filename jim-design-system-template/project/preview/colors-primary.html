<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:24px;background:var(--jim-background);display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
  .sw{border-radius:16px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;min-height:140px;border:1px solid rgba(58,31,8,.08)}
  .name{font-size:11px;font-weight:700;color:var(--jim-text);letter-spacing:-.01em}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--jim-text-body);margin-top:2px}
  .role{font-size:10px;color:var(--jim-muted);margin-top:4px;line-height:1.35}
</style></head><body>
  <div class="sw" style="background:#ff7c5c"><div></div><div><div class="name" style="color:#fff">primary</div><div class="hex" style="color:rgba(255,255,255,.85)">#ff7c5c</div><div class="role" style="color:rgba(255,255,255,.75)">CTA, logo</div></div></div>
  <div class="sw" style="background:#ff9a80"><div></div><div><div class="name" style="color:#fff">primary-mid</div><div class="hex" style="color:rgba(255,255,255,.9)">#ff9a80</div><div class="role" style="color:rgba(255,255,255,.8)">hover</div></div></div>
  <div class="sw" style="background:#ffc5b3"><div></div><div><div class="name">primary-soft</div><div class="hex">#ffc5b3</div><div class="role">séparateurs</div></div></div>
  <div class="sw" style="background:#fff0ea"><div></div><div><div class="name">primary-pale</div><div class="hex">#fff0ea</div><div class="role">fond chips</div></div></div>
  <div class="sw" style="background:#e06245"><div></div><div><div class="name" style="color:#fff">accent</div><div class="hex" style="color:rgba(255,255,255,.9)">#e06245</div><div class="role" style="color:rgba(255,255,255,.8)">highlight</div></div></div>
  <div class="sw" style="background:#f5b86a"><div></div><div><div class="name" style="color:#3a1f08">accent-warm</div><div class="hex">#f5b86a</div><div class="role">ambre</div></div></div>
</body></html>
