<!doctype html><html lang="fr"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
  body{margin:0;padding:38px 24px;background:var(--jim-background);display:flex;justify-content:center;align-items:center}
  .bar{display:flex;align-items:stretch;background:#fff;border:1px solid var(--jim-beige-mid);border-radius:24px;padding:6px;box-shadow:0 12px 40px -12px rgba(58,31,8,.18);max-width:630px;width:100%}
  .field{flex:1;padding:10px 16px;border-radius:18px;display:flex;align-items:center;gap:10px;border-right:1px solid var(--jim-beige-light)}
  .field:last-of-type{border:0}
  .ic{color:var(--jim-muted);font-size:16px;width:18px}
  .c{flex:1}
  .cap{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--jim-muted)}
  .v{font-size:13px;font-weight:500;color:var(--jim-beige-dark)}
  .v.filled{color:var(--jim-text)}
  .btn{background:var(--jim-text);color:#fff;border:0;border-radius:18px;padding:0 22px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;font-family:var(--font-sans)}
</style></head><body>
  <div class="bar">
    <div class="field"><span class="ic">⌖</span><div class="c"><div class="cap">Ville</div><div class="v filled">Lyon</div></div></div>
    <div class="field"><span class="ic">▤</span><div class="c"><div class="cap">Dates</div><div class="v">Quand ?</div></div></div>
    <div class="field"><span class="ic">✚</span><div class="c"><div class="cap">Spécialité</div><div class="v">Ortho, neuro…</div></div></div>
    <button class="btn">⌕ Rechercher ↗</button>
  </div>
</body></html>
